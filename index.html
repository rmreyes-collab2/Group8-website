<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 8 Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("bg.jpg") no-repeat center center fixed;
    background-size: cover;
    overflow: hidden;
}

/* LANDING */
#landing {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ffd1dc, #ffe5b4);
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ff8fab;
    color: white;
    font-weight: bold;
}

/* MAIN */
#main {
    display: none;
    height: 100vh;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 30%;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 20px;
    overflow-y: auto;
}

.sidebar h3 {
    border-bottom: 1px solid white;
    padding-bottom: 5px;
}

.menu-item {
    cursor: pointer;
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.menu-item:hover {
    color: #ffb6c1;
}

.menu-item img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
}

/* CONTENT */
.content {
    width: 70%;
    padding: 30px;
    background: rgba(255,255,255,0.85);
    overflow-y: auto;
}

/* PROFILE LAYOUT UPDATED */
.profile {
    text-align: center;
    padding: 20px;
}

/* IMAGE ON TOP BIG */
.profile img {
    width: 360px;
    max-width: 95%;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.profile h2 {
    font-size: 30px;
    margin-top: 15px;
    margin-bottom: 5px;
}

.profile .info {
    font-size: 16px;
    color: #333;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
    <div class="card">
        <h2>Hello! Welcome to Group 8 Website ☘️</h2>
        <button onclick="enterSite()">View Members’ Details</button>
    </div>
</div>

<!-- MAIN -->
<div id="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Menu</h3>

        <div class="menu-item" onclick="showAbout()">About Us</div>

        <h3>Members</h3>

        <div class="menu-item" onclick="showMember('rea')">
            <img src="me.jpg"> Rea May Reyes
        </div>

        <div class="menu-item" onclick="showMember('armel')">
            <img src="armel.jpg"> Armel Tolentino
        </div>

        <div class="menu-item" onclick="showMember('jhamela')">
            <img src="Jhamela.jpg"> Jhamela Pevidal
        </div>

        <div class="menu-item" onclick="showMember('ronaldo')">
            <img src="ronaldo.png"> Ronaldo Linganay
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">
        <h2>Click a menu on the left</h2>
    </div>

</div>

<script>
function enterSite() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("main").style.display = "flex";
}

function showAbout() {
    document.getElementById("content").innerHTML = `
        <h1>About Us</h1>

        <p>
        We are Group 8, currently taking <b>Bachelor of Science in Information Technology (BSIT)</b>,
        Section <b>BSIT 1B</b> at <b>Pateros Technological College</b>.
        </p>

        <p>
        We value teamwork, discipline, and continuous learning. Through collaboration,
        we aim to improve our skills in web development and become more effective in solving real-world problems.
        </p>

        <p>
        Success is not achieved alone — it is built through unity, effort, and perseverance.
        </p>

        <h3>"Alone we can do so little; together we can do so much."</h3>
    `;
}

/* UPDATED MEMBERS DATA */
function showMember(name) {

    let data = {
        rea: {
            img: "me1.jpg",
            name: "Rea May Reyes",
            info: "22 years old • Lives in Pateros",
            msg: "A dedicated and hardworking student who always strives to do her best in every task. She believes that consistency and effort lead to success, no matter how small the steps may be."
        },
        armel: {
            img: "armel1.jpg",
            name: "Armel Tolentino",
            info: "20 years old • Lives in Taguig",
            msg: "A passionate learner who values growth and teamwork. He always believes that challenges are opportunities to improve and become better every day."
        },
        jhamela: {
            img: "jhamela1.jpg",
            name: "Jhamela Pevidal",
            info: "19 years old • Lives in Taguig",
            msg: "An optimistic and determined student who always brings positivity to the group. She believes that hard work and patience will always lead to success."
        },
        ronaldo: {
            img: "ronaldo1.png",
            name: "Ronaldo Linganay",
            info: "20 years old • Lives in Taguig",
            msg: "A focused and responsible member who values discipline and effort. He believes that staying consistent and humble is the key to long-term achievement."
        }
    };

    let m = data[name];

    document.getElementById("content").innerHTML = `
        <div class="profile">

            <!-- IMAGE ON TOP -->
            <img src="${m.img}">

            <!-- NAME -->
            <h2>${m.name}</h2>

            <!-- AGE + LOCATION IN ONE LINE -->
            <div class="info">${m.info}</div>

            <!-- LONG MESSAGE -->
            <p>${m.msg}</p>

        </div>
    `;
}
</script>

</body>
</html>
