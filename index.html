<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 8 Website</title>

<style>
/* ===== BACKGROUND ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("bg.jpg") no-repeat center center fixed;
    background-size: cover;
    overflow: hidden;
}

/* ===== LANDING OVERLAY ===== */
#landing {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== GREETING CARD ===== */
.card {
    width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ffd1dc, #ffe5b4);
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* BIGGER GROUP PHOTO */
.group-photo {
    width: 260px;
    max-width: 90%;
    border-radius: 15px;
    margin: 12px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card h1 {
    margin-bottom: 10px;
}

.card button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ff8fab;
    color: white;
    font-weight: bold;
}

/* ===== MAIN PAGE ===== */
#main {
    display: none;
    height: 100vh;
    display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 30%;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 20px;
    overflow-y: auto;
}

.sidebar h3 {
    border-bottom: 1px solid white;
    padding-bottom: 5px;
}

.menu-item {
    cursor: pointer;
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 10px;
}

.menu-item:hover {
    color: #ffb6c1;
}

.menu-item img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
}

/* ===== CONTENT ===== */
.content {
    width: 70%;
    padding: 30px;
    background: rgba(255,255,255,0.85);
    overflow-y: auto;
}

/* ===== PROFILE ===== */
.profile {
    text-align: center;
    padding: 20px;
}

/* MUCH BIGGER PROFILE IMAGE */
.profile img {
    width: 380px;
    max-width: 95%;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.profile h2 {
    font-size: 30px;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- ===== LANDING PAGE ===== -->
<div id="landing">
    <div class="card">
        <h2>Welcome to Group 8 Website</h2>
        <p>Hello! We are Group 8 👋</p>

        <!-- GROUP PHOTO -->
        <img src="group.jpg" class="group-photo">

        <button onclick="enterSite()">View Members Introduction</button>
    </div>
</div>

<!-- ===== MAIN WEBSITE ===== -->
<div id="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Menu</h3>

        <div class="menu-item" onclick="showAbout()">
            About Us
        </div>

        <h3>Members</h3>

        <div class="menu-item" onclick="showMember('rea')">
            <img src="rea.jpg"> Rea May Reyes
        </div>

        <div class="menu-item" onclick="showMember('armel')">
            <img src="armel.jpg"> Armel Jade Tolentino
        </div>

        <div class="menu-item" onclick="showMember('ronaldo')">
            <img src="ronaldo.jpg"> Ronaldo Linganay
        </div>

        <div class="menu-item" onclick="showMember('jhamela')">
            <img src="jhamela.jpg"> Jhamela Pevidal
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">
        <h2>Click a menu on the left</h2>
    </div>

</div>

<script>
function enterSite() {
    document.getElementById("landing").style.display = "none";
    document.getElementById("main").style.display = "flex";
}

/* ABOUT US */
function showAbout() {
    document.getElementById("content").innerHTML = `
        <h1>About Us</h1>

        <img src="group.jpg" style="width:320px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.3);">

        <p><i>(Replace image above with your group photo file name)</i></p>

        <p>
        We are Group 8, committed to learning, teamwork, and creativity.
        Through collaboration, we aim to produce meaningful and inspiring outputs.
        </p>

        <h3>"Alone we can do so little; together we can do so much."</h3>
    `;
}

/* MEMBERS */
function showMember(name) {

    let data = {
        rea: {
            img: "rea.jpg",
            name: "Rea May Reyes",
            age: "Age: __",
            address: "Address: __",
            msg: "Keep going, your effort matters."
        },
        armel: {
            img: "armel.jpg",
            name: "Armel Jade Tolentino",
            age: "Age: __",
            address: "Address: __",
            msg: "Work hard in silence, let success speak."
        },
        ronaldo: {
            img: "ronaldo.jpg",
            name: "Ronaldo Linganay",
            age: "Age: __",
            address: "Address: __",
            msg: "Stay humble and keep improving."
        },
        jhamela: {
            img: "jhamela.jpg",
            name: "Jhamela Pevidal",
            age: "Age: __",
            address: "Address: __",
            msg: "Believe in your journey."
        }
    };

    let m = data[name];

    document.getElementById("content").innerHTML = `
        <div class="profile">
            <img src="${m.img}">
            <h2>${m.name}</h2>
            <p>${m.age}</p>
            <p>${m.address}</p>
            <p><i>${m.msg}</i></p>
        </div>
    `;
}
</script>

</body>
</html>
