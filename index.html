<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Group 8 Website</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:'Poppins', sans-serif;

    /* PUT YOUR BACKGROUND IMAGE NAME HERE */
    background:url("bg.jpg") no-repeat center center fixed;

    background-size:cover;

    height:100vh;
    overflow-x:hidden;

    color:white;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.18);

    backdrop-filter:blur(2px);

    z-index:-1;
}

/* LANDING PAGE */
#landing{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    backdrop-filter:blur(10px);

    background:rgba(255,255,255,0.05);

    z-index:10;
}

/* LANDING CARD */
.card{
    width:420px;

    padding:40px;

    border-radius:28px;

    background:rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(20px);

    box-shadow:0 8px 32px rgba(0,0,0,0.25);

    text-align:center;

    animation:fadeIn 1s ease;
}

.card h2{
    font-size:30px;
    margin-bottom:20px;
    line-height:1.4;
}

/* BUTTON */
.card button{
    padding:13px 28px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,#ff9ecf,#ffcba4);

    color:white;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;
}

.card button:hover{
    transform:translateY(-3px) scale(1.03);

    box-shadow:0 10px 20px rgba(255,182,193,0.4);
}

/* MAIN */
#main{
    display:none;

    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:300px;

    padding:25px;

    background:rgba(0,0,0,0.25);

    backdrop-filter:blur(18px);

    border-right:1px solid rgba(255,255,255,0.1);

    overflow-y:auto;
}

/* TITLES */
.sidebar h3{
    font-size:18px;

    margin-bottom:15px;

    color:#ffd6ea;

    border-bottom:1px solid rgba(255,255,255,0.15);

    padding-bottom:8px;
}

/* MENU ITEMS */
.menu-item{
    display:flex;
    align-items:center;
    gap:12px;

    padding:12px;

    margin:10px 0;

    border-radius:16px;

    cursor:pointer;

    transition:0.3s ease;
}

.menu-item:hover{
    background:rgba(255,255,255,0.12);

    transform:translateX(5px);
}

/* SIDEBAR IMAGE */
.menu-item img{
    width:42px;
    height:42px;

    object-fit:cover;

    border-radius:50%;

    border:2px solid rgba(255,255,255,0.4);
}

/* CONTENT */
.content{
    flex:1;

    padding:40px;

    overflow-y:auto;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);
}

/* PROFILE CARD */
.profile{
    max-width:700px;

    margin:auto;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    box-shadow:0 8px 30px rgba(0,0,0,0.2);

    text-align:center;

    animation:fadeIn 0.5s ease;
}

/* PROFILE IMAGE */
.profile img{
    width:320px;

    max-width:100%;

    border-radius:28px;

    box-shadow:0 10px 30px rgba(0,0,0,0.3);

    margin-bottom:20px;
}

/* NAME */
.profile h2{
    font-size:34px;

    margin-bottom:10px;
}

/* INFO */
.profile .info{
    color:#f4f4f4;

    font-size:15px;

    margin-bottom:18px;
}

/* MESSAGE */
.profile p{
    font-size:17px;

    line-height:1.8;

    color:#f9f9f9;
}

/* ABOUT SECTION */
.content h1{
    font-size:40px;

    margin-bottom:20px;
}

.content p{
    font-size:18px;

    line-height:1.9;

    margin-bottom:20px;
}

.content h3{
    margin-top:25px;

    color:#ffd6ea;
}

/* SCROLLBAR */
::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#ffc1d6;

    border-radius:10px;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- LANDING PAGE -->
<div id="landing">

    <div class="card">

        <h2>
            Hello! Welcome to Group 8 Website ☁️
        </h2>

        <button onclick="enterSite()">
            View Members' Details
        </button>

    </div>

</div>

<!-- MAIN WEBSITE -->
<div id="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>Menu</h3>

        <div class="menu-item" onclick="showAbout()">
            About Us
        </div>

        <h3>Members</h3>

        <div class="menu-item" onclick="showMember('rea')">
            <img src="me.jpg">
            Rea May Reyes
        </div>

        <div class="menu-item" onclick="showMember('armel')">
            <img src="armel.jpg">
            Armel Tolentino
        </div>

        <div class="menu-item" onclick="showMember('jhamela')">
            <img src="jhamela.jpg">
            Jhamela Pevidal
        </div>

        <div class="menu-item" onclick="showMember('ronaldo')">
            <img src="ronaldo.png">
            Ronaldo Linganay
        </div>

    </div>

    <!-- CONTENT -->
    <div class="content" id="content">

        <div class="profile">

            <h2>Group 8</h2>

            <p>
                Welcome to our aesthetic website ☁️
            </p>

        </div>

    </div>

</div>

<script>

/* ENTER WEBSITE */
function enterSite(){

    document.getElementById("landing").style.display = "none";

    document.getElementById("main").style.display = "flex";
}

/* ABOUT SECTION */
function showAbout(){

    document.getElementById("content").innerHTML = `

        <div class="profile">

            <h1>About Us</h1>

            <p>
            We are Group 8, currently taking
            <b>Bachelor of Science in Information Technology (BSIT)</b>,
            Section <b>BSIT 1B</b> at
            <b>Pateros Technological College</b>.
            </p>

            <p>
            We value teamwork, discipline, and continuous learning.
            Through collaboration, we aim to improve our skills in web development
            and become more effective in solving real-world problems.
            </p>

            <p>
            Success is not achieved alone —
            it is built through unity, effort, and perseverance.
            </p>

            <h3>
            "Alone we can do so little; together we can do so much."
            </h3>

        </div>

    `;
}

/* MEMBERS */
function showMember(name){

    let data = {

        rea:{
            img:"me1.jpg",
            name:"Rea May Reyes",
            info:"22 years old • Lives in Pateros",
            msg:"A dedicated and hardworking student who always strives to do her best in every task. She believes that consistency and effort lead to success, no matter how small the steps may be."
        },

        armel:{
            img:"armel1.jpg",
            name:"Armel Tolentino",
            info:"20 years old • Lives in Taguig",
            msg:"A passionate learner who values growth and teamwork. He always believes that challenges are opportunities to improve and become better every day."
        },

        jhamela:{
            img:"jhamela2.jpg",
            name:"Jhamela Pevidal",
            info:"19 years old • Lives in Taguig",
            msg:"An optimistic and determined student who always brings positivity to the group. She believes that hard work and patience will always lead to success."
        },

        ronaldo:{
            img:"ronaldo1.png",
            name:"Ronaldo Linganay",
            info:"20 years old • Lives in Taguig",
            msg:"A focused and responsible member who values discipline and effort. He believes that staying consistent and humble is the key to long-term achievement."
        }
    };

    let m = data[name];

    document.getElementById("content").innerHTML = `

        <div class="profile">

            <img src="${m.img}">

            <h2>${m.name}</h2>

            <div class="info">
                ${m.info}
            </div>

            <p>
                ${m.msg}
            </p>

        </div>

    `;
}

</script>

</body>
</html>
